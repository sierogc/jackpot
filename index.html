<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackpot</title>
  <style>
    /* --- VARIABILI --- */
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --transition-speed: 0.4s;
      --font-sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --font-serif: "Times New Roman", Times, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- TESTO PRINCIPALE --- */
    #text {
      position: absolute;
      color: var(--text-color);
      font-family: var(--font-serif);
      font-size: clamp(16px, 3vw, 24px);
      text-align: center;
      cursor: pointer;
      width: 90%;
      top: 65%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all var(--transition-speed) ease;
      z-index: 2;
    }

    #text.active {
      font-family: var(--font-sf);
      font-weight: 700;
      font-size: clamp(32px, 8vw, 110px);
      top: 50%;
      cursor: pointer; /* Resta cliccabile per cambiare frase */
    }

    /* --- SCRITTA "PLAY AGAIN" (In basso) --- */
    #footer-text {
      position: absolute;
      bottom: 10%; /* Posizionata in basso */
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-color);
      font-family: var(--font-serif);
      font-size: clamp(14px, 2vw, 18px);
      text-align: center;
      opacity: 0; /* Nascosta all'inizio */
      transition: opacity 0.8s ease; /* Apparizione più dolce */
      pointer-events: none;
    }

    #footer-text.visible {
      opacity: 0.6; /* Leggermente trasparente per non distrarre troppo */
    }

    .hidden {
      opacity: 0 !important;
    }
  </style>
</head>
<body>

  <!-- Testo principale -->
  <div id="text">Click to play</div>

  <!-- Testo secondario in basso -->
  <div id="footer-text">Click to play again</div>

  <audio id="audio" src="audio.mp3" loop preload="auto"></audio>

  <script>
    const textEl = document.getElementById("text");
    const footerEl = document.getElementById("footer-text");
    const audioEl = document.getElementById("audio");

    const phrases = ["I win, you lose", "You win, I lose"];
    let isStarted = false;
    let isTransitioning = false;

    function fadeInAudio(audio, duration = 2000) {
      audio.volume = 0;
      audio.play().catch(() => {});
      let step = 0.05;
      const interval = setInterval(() => {
        if (audio.volume < 1 - step) audio.volume += step;
        else { audio.volume = 1; clearInterval(interval); }
      }, duration * step);
    }

    function handleInteraction() {
      if (isTransitioning) return;
      isTransitioning = true;

      // Nascondi il testo principale per il cambio
      textEl.classList.add("hidden");

      setTimeout(() => {
        if (!isStarted) {
          fadeInAudio(audioEl);
          textEl.classList.add("active");
          // Mostra la scritta in basso solo dopo il primo click
          footerEl.classList.add("visible");
          isStarted = true;
        }

        // Cambia frase casualmente
        const randomIndex = Math.floor(Math.random() * phrases.length);
        textEl.textContent = phrases[randomIndex];

        // Mostra di nuovo il testo
        textEl.classList.remove("hidden");

        setTimeout(() => {
          isTransitioning = false;
        }, 400);
      }, 400);
    }

    // Cliccando ovunque sullo schermo si attiva l'interazione
    document.body.addEventListener("click", handleInteraction);
  </script>
</body>
</html>
