<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackpot</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --font-sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --font-serif: "Times New Roman", Times, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- TESTO PRINCIPALE --- */
    #text {
      position: absolute;
      color: var(--text-color);
      font-family: var(--font-serif);
      /* Ridotto del 25% rispetto a prima (era 16px-24px) */
      font-size: clamp(12px, 2.2vw, 18px); 
      text-align: center;
      cursor: pointer;
      width: 90%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Posizionato leggermente più in alto (era 65%) */
      top: 58%; 
      z-index: 2;
      /* Nessuna transizione per il cambio testo/posizione */
    }

    /* Stato quando appaiono le frasi Win/Lose */
    #text.active {
      font-family: var(--font-sf);
      font-weight: 700;
      /* Aumentato del 25% rispetto a prima (era 32px-110px) */
      font-size: clamp(40px, 10vw, 138px);
      top: 50%; /* Centro perfetto */
    }

    /* --- SCRITTA "PLAY AGAIN" --- */
    #footer-text {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-color);
      font-family: var(--font-serif);
      font-size: clamp(14px, 2vw, 18px);
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #footer-text.visible {
      opacity: 0.6;
    }

    /* Rimosso l'effetto di dissolvenza (hidden) per il testo principale */
  </style>
</head>
<body>

  <div id="text">Click to play</div>
  <div id="footer-text">click to play again</div>

  <audio id="audio" src="audio.mp3" preload="auto"></audio>

  <script>
    const textEl = document.getElementById("text");
    const footerEl = document.getElementById("footer-text");
    const audioEl = document.getElementById("audio");

    const phrases = ["I win, you lose", "You win, I lose"];
    let isStarted = false;

    function playAudioReset() {
      audioEl.currentTime = 0;
      audioEl.volume = 1; 
      audioEl.play().catch(() => {});
    }

    function handleInteraction() {
      // Audio istantaneo al click
      playAudioReset();

      if (!isStarted) {
        textEl.classList.add("active");
        footerEl.classList.add("visible");
        isStarted = true;
      }

      // Cambio frase istantaneo senza animazione
      const randomIndex = Math.floor(Math.random() * phrases.length);
      textEl.textContent = phrases[randomIndex];
    }

    document.body.addEventListener("click", handleInteraction);
  </script>
</body>
</html>
