<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackpot</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
    }

    #text {
      color: white;
      font-size: clamp(24px, 5vw, 48px);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="text"></div>

  <script>
    const phrases = [
      "I win, you lose",
      "You win, I lose"
    ];

    const randomIndex = Math.floor(Math.random() * phrases.length);
    document.getElementById("text").textContent = phrases[randomIndex];
  </script>
</body>
</html>
