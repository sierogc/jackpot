<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackpot</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Stato iniziale: molto piccolo e leggermente più in basso */
    #text {
      color: white;
      font-size: clamp(10px, 2vw, 18px);
      text-align: center;
      cursor: pointer;
      font-family: "Times New Roman", Times, serif;
      opacity: 1;
      transform: translateY(20vh);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* Stato attivo: grande e centrato visivamente */
    .active {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
      font-size: clamp(40px, 8.75vw, 90px);
      transform: translateY(0);
    }

    .hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="text">Click to play</div>

  <audio id="audio" src="audio.mp3" loop></audio>

  <script>
    const textEl = document.getElementById("text");
    const audio = document.getElementById("audio");

    const phrases = [
      "I win, you lose",
      "You win, I lose"
    ];

    let started = false;

    function fadeInAudio(audioEl, duration = 2000) {
      audioEl.volume = 0;
      audioEl.play();

      let step = 0.05;
      let interval = duration * step;

      const fade = setInterval(() => {
        if (audioEl.volume < 1) {
          audioEl.volume = Math.min(audioEl.volume + step, 1);
        } else {
          clearInterval(fade);
        }
      }, interval);
    }

    function randomizeText() {
      const randomIndex = Math.floor(Math.random() * phrases.length);
      textEl.textContent = phrases[randomIndex];
    }

    function handleClick() {
      textEl.classList.add("hidden");

      setTimeout(() => {
        if (!started) {
          fadeInAudio(audio);
          textEl.classList.add("active");
          started = true;
        }

        randomizeText();
        textEl.classList.remove("hidden");
      }, 300);
    }

    // Click ovunque nella pagina
    document.body.addEventListener("click", handleClick);
  </script>
</body>
</html>
